#
# Salt minion configuration for qubes-salt-config.
# Copied to /etc/salt/minion.d/ in dom0 by scripts/setup.sh.
#
# This adds our formula directory to file_roots so states resolve with no
# prefix (e.g. `qubesctl state.apply mgmt.mirror.dom0`).
#
# IMPORTANT: this project does NOT use Salt pillar. In Qubes dom0, a plain
# top.sls dropped into a custom pillar_root is not registered by Qubes' topd
# (_tops) mechanism and can break pillar loading for the whole system. So there
# is intentionally NO pillar_roots here — all user configuration lives in
# /srv/salt/slchris/config.jinja, imported directly by the states.
#
# Usage examples:
#   qubesctl state.apply mgmt.mirror.dom0
#   qubesctl state.apply templates.dev.create
#   qubesctl --skip-dom0 --targets=tpl-dev state.apply templates.dev.install

file_roots:
  base:
    # Our formulas (first, so slsdotpath has no prefix)
    - /srv/salt/slchris
