#
# Salt minion configuration for qubes-salt-config
# Copy this file to /etc/salt/minion.d/ in dom0
#
# IMPORTANT: Unlike qusal, this project does NOT rely on separate system
# minion configs. We include all needed paths here because Salt's file_roots
# is REPLACED (not merged) when multiple configs define it.
#
# The qvm/template.jinja file comes from qubes-mgmt-salt-dom0-virtual-machines
# which is installed at /srv/formulas/dom0/virtual-machines-formula/
#
# Usage examples:
#   qubesctl state.apply debian-minimal.clone
#   qubesctl state.apply templates.dev.create
#   qubesctl --skip-dom0 --targets=tpl-dev state.apply templates.dev.install

---
file_roots:
  base:
    # Our formulas (first, so slsdotpath has no prefix)
    - /srv/salt/slchris
pillar_roots:
  base:
    - /srv/pillar/slchris
